<div class="register-container">
  <div class="register-card">
    <h1>🌤️ AngularWeather</h1>
    <h2>Criar conta</h2>

    <div *ngIf="error" class="error">{{ error }}</div>
    <div *ngIf="success" class="success">{{ success }}</div>

    <input type="email" placeholder="Email" [(ngModel)]="email" />
    <input type="password" placeholder="Senha" [(ngModel)]="password" />
    <input type="password" placeholder="Confirmar senha" [(ngModel)]="confirm" />
    <button (click)="onRegister()">Cadastrar</button>

    <p>Já tem conta? <a routerLink="/login">Entrar</a></p>
  </div>
</div>

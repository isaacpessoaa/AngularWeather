<div class="favorites-container">
  <header>
    <a routerLink="/home">← Voltar</a>
    <h1>⭐ Favoritos</h1>
    <span></span>
  </header>

  <div *ngIf="favorites.length === 0" class="empty">
    <p>Você ainda não tem cidades favoritas.</p>
    <a routerLink="/home">Buscar cidades</a>
  </div>

  <div class="favorites-list">
    <div class="fav-card" *ngFor="let w of weatherData">
      <div class="fav-info" (click)="goToDetail(w.name)">
        <div class="fav-city">{{ w.name }}, {{ w.sys.country }}</div>
        <div class="fav-desc">{{ w.weather[0].description }}</div>
      </div>
      <div class="fav-right">
        <div class="fav-temp">{{ w.main.temp | number:'1.0-0' }}°C</div>
        <button (click)="remove(w.name)">✕</button>
      </div>
    </div>
  </div>
</div>
